<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 · Brand Research</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .login-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 380px;
      padding: 40px;
      animation: slideUp 0.4s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1a1a1a;
    }

    .login-subtitle {
      font-size: 13px;
      color: #999;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #333;
    }

    .form-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s, box-shadow 0.3s;
      font-family: inherit;
    }

    .form-input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-input::placeholder {
      color: #bbb;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 10px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      color: #dc2626;
      font-size: 12px;
      margin-top: 6px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .loading {
      display: none;
      text-align: center;
      color: #667eea;
      font-size: 12px;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(102, 126, 234, 0.2);
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading.show {
      display: block;
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-header">
    <div class="login-title">Brand Research</div>
    <div class="login-subtitle">品牌社交矩阵分析系统</div>
  </div>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label class="form-label">账号</label>
      <input 
        type="email" 
        id="username" 
        class="form-input" 
        placeholder="admin@WantAiOS"
        required
        autocomplete="email"
      >
      <div class="error-message" id="usernameError"></div>
    </div>

    <div class="form-group">
      <label class="form-label">密码</label>
      <input 
        type="password" 
        id="password" 
        class="form-input" 
        placeholder="请输入密码"
        required
        autocomplete="current-password"
      >
      <div class="error-message" id="passwordError"></div>
    </div>

    <button type="submit" class="login-btn" id="loginBtn">登录</button>
    <div class="loading" id="loading">
      <span class="spinner"></span>
      登录中...
    </div>
    <div class="error-message" id="loginError"></div>
  </form>
</div>

<script>
  const VALID_USERNAME = 'admin@WantAiOS';
  const VALID_PASSWORD = 'WantAiOS2026';

  function handleLogin(event) {
    event.preventDefault();
    
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const loginBtn = document.getElementById('loginBtn');
    const loading = document.getElementById('loading');
    const usernameError = document.getElementById('usernameError');
    const passwordError = document.getElementById('passwordError');
    const loginError = document.getElementById('loginError');

    // 清除所有错误提示
    usernameError.classList.remove('show');
    passwordError.classList.remove('show');
    loginError.classList.remove('show');

    // 验证
    let hasError = false;
    if (!username) {
      usernameError.textContent = '请输入账号';
      usernameError.classList.add('show');
      hasError = true;
    }
    if (!password) {
      passwordError.textContent = '请输入密码';
      passwordError.classList.add('show');
      hasError = true;
    }

    if (hasError) return;

    // 模拟登录过程
    loginBtn.disabled = true;
    loading.classList.add('show');

    // 延迟 500ms 模拟网络请求
    setTimeout(() => {
      if (username === VALID_USERNAME && password === VALID_PASSWORD) {
        // 登录成功，存储 token 到 localStorage
        const token = btoa(`${username}:${password}:${Date.now()}`);
        localStorage.setItem('authToken', token);
        localStorage.setItem('loginTime', new Date().toISOString());
        
        // 重定向到首页或之前的页面
        const redirectUrl = sessionStorage.getItem('redirectUrl') || 'index.html';
        window.location.href = redirectUrl;
      } else {
        // 登录失败
        if (username !== VALID_USERNAME) {
          loginError.textContent = '账号或密码错误';
        } else {
          loginError.textContent = '账号或密码错误';
        }
        loginError.classList.add('show');
        loginBtn.disabled = false;
        loading.classList.remove('show');
      }
    }, 500);
  }

  // 如果已登录，重定向到首页
  if (localStorage.getItem('authToken')) {
    window.location.href = 'index.html';
  }
</script>

</body>
</html>
