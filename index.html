<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>品牌社媒内容管理平台</title>
<style>
:root {
  --byd: #06B6D4; --ford: #003476; --toyota: #EB0A1E;
  --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
  --text: #e8e9f0; --muted: #7b7f8e; --accent: #4f8ef7;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', 'PingFang SC', system-ui; font-size: 14px; }

.header { background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%); border-bottom: 1px solid var(--border); padding: 24px 40px; }
.header h1 { font-size: 24px; font-weight: 700; }
.header .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

.container { max-width: 1400px; margin: 0 auto; padding: 32px 40px; }

/* ── Section: Filters ── */
.filter-section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 28px; }
.filter-section h3 { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: #fff; }
.filter-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; margin-bottom: 14px; }
.filter-group:last-child { margin-bottom: 0; }
.filter-label { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 8px; display: block; }
.filter-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
.filter-btn { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--card); color: var(--muted); cursor: pointer; font-size: 12px; font-weight: 600; transition: all .2s; }
.filter-btn.active { background: rgba(79,142,247,.15); border-color: var(--accent); color: var(--accent); }
.filter-btn.active.byd { background: rgba(6,182,212,.15); border-color: var(--byd); color: var(--byd); }
.filter-btn.active.ford { background: rgba(0,52,118,.2); border-color: #4f8ef7; color: #4f8ef7; }
.filter-btn.active.toyota { background: rgba(235,10,30,.12); border-color: var(--toyota); color: var(--toyota); }

.date-inputs { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.date-inputs input { padding: 6px 10px; border: 1.5px solid var(--border); border-radius: 6px; background: rgba(79,142,247,.08); color: #fff; font-size: 12px; }
.date-inputs button { padding: 6px 12px; border: 1.5px solid var(--border); border-radius: 6px; background: rgba(79,142,247,.1); color: #fff; font-size: 12px; cursor: pointer; transition: all .2s; }
.date-inputs button:hover { background: rgba(79,142,247,.2); }

/* ── Section: Platform Stats ── */
.stats-section { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; cursor: pointer; transition: all .2s; }
.stat-card.active { border-color: var(--accent); background: rgba(79,142,247,.1); }
.stat-card h4 { font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 8px; }
.stat-card .count { font-size: 28px; font-weight: 800; color: var(--accent); }

/* ── Section: Timeline Grid ── */
.timeline-grid { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 28px; overflow-x: auto; display: none; }
.timeline-grid.active { display: block; }
.timeline-grid h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; }
.timeline-grid table { width: 100%; border-collapse: collapse; font-size: 11px; }
.timeline-grid th { background: rgba(79,142,247,.1); padding: 8px; text-align: center; border: 1px solid var(--border); font-weight: 600; }
.timeline-grid td { padding: 8px; border: 1px solid var(--border); text-align: center; background: rgba(0,0,0,.2); }
.timeline-grid td.has-data { background: rgba(79,142,247,.08); border-color: rgba(79,142,247,.3); cursor: pointer; transition: all .2s; }
.timeline-grid td.has-data:hover { background: rgba(79,142,247,.15); border-color: rgba(79,142,247,.5); }

/* ── Section: Content List ── */
.content-section { margin-bottom: 28px; }
.content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.sort-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
.sort-btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--card); color: var(--muted); cursor: pointer; font-size: 12px; transition: all .2s; }
.sort-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.content-list { display: grid; gap: 12px; }
.content-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; cursor: pointer; transition: all .2s; }
.content-card:hover { border-color: var(--accent); background: rgba(79,142,247,.05); }
.card-meta { display: flex; gap: 12px; align-items: center; margin-bottom: 8px; font-size: 11px; }
.card-badge { padding: 2px 8px; border-radius: 10px; font-weight: 600; white-space: nowrap; }
.badge-tt { background: #333; color: #ccc; }
.badge-ig { background: rgba(193,53,132,.15); color: #e879c2; }
.badge-fb { background: rgba(24,119,242,.15); color: #60a5fa; }
.card-text { color: var(--muted); line-height: 1.5; margin-bottom: 8px; }
.card-stats { display: flex; gap: 14px; font-size: 11px; color: var(--muted); }
.card-stats span { font-weight: 600; color: var(--text); }

.pagination { display: flex; gap: 8px; justify-content: center; margin-top: 20px; }
.pagination button { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--card); color: var(--muted); cursor: pointer; font-size: 12px; }
.pagination button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
</style>
</head>
<body>

<div class="header">
  <h1>品牌社媒内容管理平台</h1>
  <div class="sub">BYD · Ford · Toyota 三品牌社交媒体内容聚合与分析</div>
</div>

<div class="container">

<!-- 加载指示器 -->
<div id="loading-indicator" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15,17,23,.9); display: flex; align-items: center; justify-content: center; z-index: 9999; font-size: 16px; color: var(--text);">
  <div style="text-align: center;">
    <div style="font-size: 20px; margin-bottom: 16px;">⏳ 加载中...</div>
    <div style="color: var(--muted); font-size: 12px;">正在加载社媒内容数据</div>
  </div>
</div>

<!-- ── PART 1: Filters ── -->
<div class="filter-section">
  <h3>筛选条件</h3>
  
  <div class="filter-group">
    <div>
      <label class="filter-label">品牌</label>
      <div class="filter-buttons">
        <button class="filter-btn active" data-filter="brand" data-value="all">全部</button>
        <button class="filter-btn active byd" data-filter="brand" data-value="BYD">BYD</button>
        <button class="filter-btn active ford" data-filter="brand" data-value="Ford">Ford</button>
        <button class="filter-btn active toyota" data-filter="brand" data-value="Toyota">Toyota</button>
      </div>
    </div>
    <div id="model-filter-group">
      <label class="filter-label">车型</label>
      <div class="filter-buttons" id="model-filter-buttons">
        <button class="filter-btn active" data-filter="model" data-value="all">全部</button>
      </div>
    </div>
    <div>
      <label class="filter-label">日期范围</label>
      <div class="date-inputs" style="gap: 4px;">
        <input type="date" id="date-from" title="开始日期">
        <input type="date" id="date-to" title="结束日期">
        <button onclick="applyFilters()" style="padding:6px 12px;background:rgba(79,142,247,.6);border:1.5px solid rgba(79,142,247,.7);border-radius:6px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s" onmouseover="this.style.background='rgba(79,142,247,.8)'" onmouseout="this.style.background='rgba(79,142,247,.6)'">应用</button>
        <button onclick="resetDateFilter()" style="padding:6px 12px;background:rgba(100,100,100,.2);border:1.5px solid rgba(100,100,100,.3);border-radius:6px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s" onmouseover="this.style.background='rgba(100,100,100,.3)'" onmouseout="this.style.background='rgba(100,100,100,.2)'">重置</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Active Filters Display ── -->
<div id="active-filters" style="margin-bottom:20px;display:none">
  <div style="font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:600">活跃筛选条件：</div>
  <div id="filter-tags" style="display:flex;flex-wrap:wrap;gap:8px"></div>
</div>

<!-- ── PART 2: Platform Stats ── -->
<div class="stats-section" id="stats-section"></div>

<!-- ── PART 3: Timeline Grid ── -->
<div class="timeline-grid" id="timeline-grid">
  <h3>发布时间分布（年×月）</h3>
  <table id="timeline-table"></table>
</div>

<!-- ── PART 4: Content List ── -->
<div class="content-section">
  <div class="content-header">
    <div style="font-weight: 700;">内容列表 <span id="content-count" style="color: var(--muted); font-weight: 400;">0</span></div>
    <div class="sort-buttons">
      <button class="sort-btn active" data-sort="date" data-order="desc">最新发布 ↓</button>
      <button class="sort-btn" data-sort="like" data-order="desc">点赞最多 ↓</button>
      <button class="sort-btn" data-sort="comment" data-order="desc">评论最多 ↓</button>
      <button class="sort-btn" data-sort="share" data-order="desc">转发最多 ↓</button>
    </div>
  </div>
  <div class="content-list" id="content-list"></div>
  <div class="pagination" id="pagination"></div>
</div>

</div>

<script>
let allData = null;
let filteredPosts = [];
let currentPage = 1;
const postsPerPage = 20;

const filters = {
  brands: new Set(['all']),
  models: new Set(['all']),
  platforms: new Set(['tiktok', 'instagram', 'facebook']),
  dateFrom: null,
  dateTo: null,
  sortBy: 'date',
  sortOrder: 'desc',
};

// 加载数据
fetch('timeline_data.json')
  .then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  })
  .then(data => {
    allData = data;
    initUI();
    applyFilters();
    document.getElementById('loading-indicator').style.display = 'none';
  })
  .catch(err => {
    console.error('✗ Load error:', err);
    document.getElementById('loading-indicator').innerHTML = `
      <div style="text-align: center; color: #ff6b6b;">
        <div style="font-size: 20px; margin-bottom: 16px;">❌ 加载失败</div>
        <div style="color: var(--muted); font-size: 12px; margin-bottom: 8px;">${err.message}</div>
        <button onclick="location.reload()" style="padding: 8px 16px; background: var(--accent); border: none; border-radius: 6px; color: #fff; cursor: pointer;">重试</button>
      </div>
    `;
  });

// 初始化 UI 事件
function initUI() {
  // 首次加载时生成车型选项
  updateModelOptions();

  document.querySelectorAll('[data-filter="brand"]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const val = e.target.dataset.value;
      if (val === 'all') {
        filters.brands.clear();
        filters.brands.add('all');
        document.querySelectorAll('[data-filter="brand"]').forEach(b => {
          b.classList.toggle('active', b.dataset.value === 'all' || b.dataset.value === 'all');
        });
      } else {
        filters.brands.delete('all');
        if (filters.brands.has(val)) {
          filters.brands.delete(val);
        } else {
          filters.brands.add(val);
        }
        updateBrandButtons();
      }
      // 品牌变化时，重置车型筛选并更新车型列表
      filters.models.clear();
      filters.models.add('all');
      updateModelOptions();
      applyFilters();
    });
  });

  // 使用事件委托来处理车型按钮点击（包括动态创建的按钮）
  document.getElementById('model-filter-buttons').addEventListener('click', (e) => {
    if (e.target.dataset.filter !== 'model') return;
    const val = e.target.dataset.value;
    if (val === 'all') {
      filters.models.clear();
      filters.models.add('all');
      document.querySelectorAll('[data-filter="model"]').forEach(b => {
        b.classList.toggle('active', true);
      });
    } else {
      filters.models.delete('all');
      if (filters.models.has(val)) {
        filters.models.delete(val);
      } else {
        filters.models.add(val);
        // 选择车型时自动选中对应的品牌
        autoSelectBrandForModel(val);
      }
      updateModelButtons();
    }
    applyFilters();
  });

  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      filters.sortBy = e.target.dataset.sort;
      filters.sortOrder = e.target.dataset.order;
      currentPage = 1;
      applyFilters();  // 改为调用 applyFilters 以重新应用排序
    });
  });
}

function updateBrandButtons() {
  document.querySelectorAll('[data-filter="brand"]').forEach(btn => {
    const val = btn.dataset.value;
    if (val === 'all') {
      btn.classList.toggle('active', filters.brands.size === 0 || filters.brands.has('all'));
    } else {
      btn.classList.toggle('active', filters.brands.has(val));
    }
  });
}

function updateModelOptions() {
  // 获取选中品牌对应的所有车型
  const selectedBrands = filters.brands.has('all')
    ? ['BYD', 'Ford', 'Toyota']
    : Array.from(filters.brands);

  const availableModels = new Set();
  if (allData && allData.all_posts) {
    allData.all_posts.forEach(post => {
      if (selectedBrands.includes(post.brand) && post.models && post.models.length > 0) {
        post.models.forEach(m => availableModels.add(m));
      }
    });
  }

  console.log('availableModels:', Array.from(availableModels));

  // 生成车型按钮 - 使用 ID 查找容器
  const filterButtons = document.getElementById('model-filter-buttons');
  console.log('filterButtons found:', !!filterButtons);
  if (!filterButtons) {
    console.error('model-filter-buttons not found!');
    return;
  }

  filterButtons.innerHTML = '';

  // 创建"全部"按钮
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.setAttribute('data-filter', 'model');
  allBtn.setAttribute('data-value', 'all');
  allBtn.textContent = '全部';
  filterButtons.appendChild(allBtn);

  Array.from(availableModels).sort().forEach(model => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn active';
    btn.setAttribute('data-filter', 'model');
    btn.setAttribute('data-value', model);
    btn.textContent = model;
    filterButtons.appendChild(btn);
  });

  updateModelButtons();
}

function updateModelButtons() {
  document.querySelectorAll('[data-filter="model"]').forEach(btn => {
    const val = btn.dataset.value;
    if (val === 'all') {
      btn.classList.toggle('active', filters.models.size === 0 || filters.models.has('all'));
    } else {
      btn.classList.toggle('active', filters.models.has(val));
    }
  });
}

// 根据选中的车型自动选中品牌
function autoSelectBrandForModel(model) {
  // 需要根据模型名称推断品牌
  const brandMap = {
    // BYD 车型
    'Shark': 'BYD', 'Song': 'BYD', 'Qin': 'BYD', 'Yuan': 'BYD', 'Seagull': 'BYD', 'Atto': 'BYD', 'Sealion': 'BYD', 'Denza': 'BYD',
    // Ford 车型
    'Ranger': 'Ford', 'Mustang': 'Ford', 'F-150': 'Ford', 'Escape': 'Ford', 'Explorer': 'Ford', 'Bronco': 'Ford', 'Mach-E': 'Ford', 'GT': 'Ford',
    // Toyota 车型
    'Hilux': 'Toyota', 'Corolla': 'Toyota', 'Camry': 'Toyota', '4Runner': 'Toyota', 'Land Cruiser': 'Toyota', 'RAV4': 'Toyota', 'Prius': 'Toyota', 'Sequoia': 'Toyota', 'Highlander': 'Toyota', 'Sienna': 'Toyota',
  };

  const brand = brandMap[model];
  if (brand && !filters.brands.has(brand)) {
    filters.brands.delete('all');
    filters.brands.add(brand);
    updateBrandButtons();
  }
}

// 更新筛选条件展示栏
function updateFilterTags() {
  const container = document.getElementById('filter-tags');
  const tags = [];

  // 品牌标签
  if (!filters.brands.has('all') && filters.brands.size > 0) {
    Array.from(filters.brands).forEach(b => {
      tags.push({ type: 'brand', value: b, display: b });
    });
  }

  // 车型标签
  if (!filters.models.has('all') && filters.models.size > 0) {
    Array.from(filters.models).forEach(m => {
      tags.push({ type: 'model', value: m, display: m });
    });
  }

  // 平台标签
  if (filters.platforms.size !== 3) {
    Array.from(filters.platforms).forEach(p => {
      const names = { tiktok: 'TikTok', instagram: 'Instagram', facebook: 'Facebook' };
      tags.push({ type: 'platform', value: p, display: names[p] });
    });
  }

  // 日期标签
  if (filters.dateFrom || filters.dateTo) {
    const display = `${filters.dateFrom || '开始'} ~ ${filters.dateTo || '结束'}`;
    tags.push({ type: 'date', value: 'date', display });
  }

  // 生成标签 HTML
  container.innerHTML = tags.map(tag => `
    <div style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.3);border-radius:16px;font-size:12px;color:var(--accent)">
      ${tag.display}
      <button onclick="removeFilterTag('${tag.type}', '${tag.value}')" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:14px;padding:0;margin:0">✕</button>
    </div>
  `).join('');

  // 显示/隐藏容器
  document.getElementById('active-filters').style.display = tags.length > 0 ? 'block' : 'none';
}

// 删除单个筛选条件
function removeFilterTag(type, value) {
  if (type === 'brand') {
    filters.brands.delete(value);
    if (filters.brands.size === 0) filters.brands.add('all');
    updateBrandButtons();
  } else if (type === 'model') {
    filters.models.delete(value);
    if (filters.models.size === 0) filters.models.add('all');
    updateModelButtons();
  } else if (type === 'platform') {
    filters.platforms.delete(value);
    if (filters.platforms.size === 0) {
      filters.platforms.add('tiktok');
      filters.platforms.add('instagram');
      filters.platforms.add('facebook');
    }
    updateStats();
  } else if (type === 'date') {
    resetDateFilter();
    return;
  }
  applyFilters();
}

function resetDateFilter() {
  document.getElementById('date-from').value = '';
  document.getElementById('date-to').value = '';
  filters.dateFrom = null;
  filters.dateTo = null;
  updateFilterTags();
  applyFilters();
}

function applyFilters() {
  if (!allData) return;

  filters.dateFrom = document.getElementById('date-from').value;
  filters.dateTo = document.getElementById('date-to').value;

  console.log('applyFilters called. filters.models:', Array.from(filters.models));

  filteredPosts = allData.all_posts.filter(post => {
    // 品牌筛选
    if (!filters.brands.has('all') && !filters.brands.has(post.brand)) return false;
    // 车型筛选
    if (!filters.models.has('all')) {
      const hasModel = Array.from(filters.models).some(m => post.models && post.models.includes(m));
      if (!hasModel) return false;
    }
    // 平台筛选
    if (!filters.platforms.has(post.platform)) return false;
    // 日期筛选
    if (filters.dateFrom && post.date < filters.dateFrom) return false;
    if (filters.dateTo && post.date > filters.dateTo) return false;
    return true;
  });

  console.log('Filtered posts after model filter:', filteredPosts.length);

  // 排序
  filteredPosts.sort((a, b) => {
    let aVal = 0, bVal = 0;
    if (filters.sortBy === 'date') {
      aVal = new Date(a.date).getTime();
      bVal = new Date(b.date).getTime();
    } else if (filters.sortBy === 'like') {
      aVal = a.like || 0;
      bVal = b.like || 0;
    } else if (filters.sortBy === 'comment') {
      aVal = a.comment || 0;
      bVal = b.comment || 0;
    } else if (filters.sortBy === 'share') {
      aVal = a.share || 0;
      bVal = b.share || 0;
    }
    return filters.sortOrder === 'desc' ? bVal - aVal : aVal - bVal;
  });

  currentPage = 1;
  updateStats();
  renderTimeline();
  renderContentList();
  updateFilterTags();
}

function renderTimeline() {
  const table = document.getElementById('timeline-table');
  if (!filteredPosts.length) {
    document.getElementById('timeline-grid').classList.remove('active');
    return;
  }

  // 统计每个月份的发布数量
  const monthData = {};
  filteredPosts.forEach(post => {
    const ym = post.date.slice(0, 7); // YYYY-MM
    monthData[ym] = (monthData[ym] || 0) + 1;
  });

  if (Object.keys(monthData).length === 0) {
    document.getElementById('timeline-grid').classList.remove('active');
    return;
  }

  document.getElementById('timeline-grid').classList.add('active');

  // 获取时间范围
  const allYMs = Object.keys(monthData).sort();
  const minYM = allYMs[0];
  const maxYM = allYMs[allYMs.length - 1];
  const [minY, minM] = minYM.split('-').map(Number);
  const [maxY, maxM] = maxYM.split('-').map(Number);

  // 生成表头（月份）
  let html = '<tr><th>年份</th>';
  for (let m = 1; m <= 12; m++) {
    html += `<th>${m}</th>`;
  }
  html += '</tr>';

  // 生成行（年份）
  for (let y = minY; y <= maxY; y++) {
    html += `<tr><th>${y}</th>`;
    for (let m = 1; m <= 12; m++) {
      const ym = `${y}-${String(m).padStart(2, '0')}`;
      const count = monthData[ym] || 0;
      if (count > 0) {
        html += `<td class="has-data" onclick="filterByMonth('${ym}')" title="${count} 条内容">${count}</td>`;
      } else {
        html += '<td></td>';
      }
    }
    html += '</tr>';
  }

  table.innerHTML = html;
}

function filterByMonth(ym) {
  const dateFrom = document.getElementById('date-from');
  const dateTo = document.getElementById('date-to');
  const [y, m] = ym.split('-').map(Number);
  const firstDay = ym + '-01';
  const lastDay = ym + '-' + String(new Date(y, m, 0).getDate()).padStart(2, '0');

  // 如果已经选择了日期范围，根据点击的月份扩展范围
  if (dateFrom.value && dateTo.value) {
    const currentFrom = dateFrom.value;
    const currentTo = dateTo.value;

    // 如果点击的月份在范围之外，扩展范围
    if (firstDay < currentFrom) {
      dateFrom.value = firstDay;
    } else if (lastDay > currentTo) {
      dateTo.value = lastDay;
    } else if (firstDay >= currentFrom && lastDay <= currentTo) {
      // 如果点击的月份已在范围内，则重置为仅选择该月
      dateFrom.value = firstDay;
      dateTo.value = lastDay;
    }
  } else {
    // 第一次选择
    dateFrom.value = firstDay;
    dateTo.value = lastDay;
  }

  applyFilters();
}

function updateStats() {
  const statsSection = document.getElementById('stats-section');
  statsSection.innerHTML = '';

  ['all', 'tiktok', 'instagram', 'facebook'].forEach(plat => {
    const count = plat === 'all'
      ? filteredPosts.length
      : filteredPosts.filter(p => p.platform === plat).length;
    const names = {all: '全部', tiktok: 'TikTok', instagram: 'Instagram', facebook: 'Facebook'};
    const card = document.createElement('div');
    const isActive = plat === 'all' ? filters.platforms.size === 3 : filters.platforms.has(plat);
    card.className = `stat-card ${isActive ? 'active' : ''}`;
    card.innerHTML = `<h4>${names[plat]}</h4><div class="count">${count}</div>`;
    card.addEventListener('click', () => togglePlatform(plat));
    statsSection.appendChild(card);
  });
}

function togglePlatform(plat) {
  if (plat === 'all') {
    if (filters.platforms.size === 3) {
      filters.platforms.clear();
    } else {
      filters.platforms.add('tiktok');
      filters.platforms.add('instagram');
      filters.platforms.add('facebook');
    }
  } else {
    if (filters.platforms.has(plat)) {
      filters.platforms.delete(plat);
    } else {
      filters.platforms.add(plat);
    }
  }
  applyFilters();
}

function renderContentList() {
  const list = document.getElementById('content-list');
  const start = (currentPage - 1) * postsPerPage;
  const end = start + postsPerPage;
  const pageData = filteredPosts.slice(start, end);

  document.getElementById('content-count').textContent = `(${filteredPosts.length})`;

  if (!pageData.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px">暂无内容</div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  list.innerHTML = pageData.map((post, idx) => {
    const badgeMap = { tiktok: '😊', instagram: '📷', facebook: '👍' };
    const classMap = { tiktok: 'badge-tt', instagram: 'badge-ig', facebook: 'badge-fb' };
    const clickHandler = post.url ? `onclick="window.open('${post.url.replace(/'/g, "\\'")}','_blank')"` : '';

    // 根据平台类型显示对应的统计数据
    let statsHtml = '';
    if (post.platform === 'tiktok') {
      if (post.play >= 0) statsHtml += `<span>▶ ${post.play.toLocaleString()}p</span>`;
      if (post.like >= 0) statsHtml += `<span>♥ ${post.like.toLocaleString()}</span>`;
      if (post.comment >= 0) statsHtml += `<span>💬 ${post.comment.toLocaleString()}</span>`;
      if (post.share >= 0) statsHtml += `<span>↗ ${post.share.toLocaleString()}</span>`;
    } else if (post.platform === 'instagram') {
      if (post.like >= 0) statsHtml += `<span>♥ ${post.like.toLocaleString()}</span>`;
      if (post.comment >= 0) statsHtml += `<span>💬 ${post.comment.toLocaleString()}</span>`;
      if (post.share >= 0) statsHtml += `<span>↗ ${post.share.toLocaleString()}</span>`;
    } else if (post.platform === 'facebook') {
      if (post.like >= 0) statsHtml += `<span>👍 ${post.like.toLocaleString()}</span>`;
      if (post.comment >= 0) statsHtml += `<span>💬 ${post.comment.toLocaleString()}</span>`;
      if (post.share >= 0) statsHtml += `<span>↗ ${post.share.toLocaleString()}</span>`;
    }

    return `
      <div class="content-card" ${clickHandler} style="${post.url ? 'cursor:pointer' : ''}">
        <div class="card-meta">
          <span class="card-badge ${classMap[post.platform]}">${badgeMap[post.platform]} ${post.platform}</span>
          <span style="color:var(--muted)">${post.date}</span>
          <span style="color:var(--accent);font-weight:600;margin-left:auto">${post.brand}</span>
        </div>
        <div class="card-text">${post.text}</div>
        <div class="card-stats">${statsHtml}</div>
      </div>
    `;
  }).join('');

  renderPagination();
}

function renderPagination() {
  const pagination = document.getElementById('pagination');
  const totalPages = Math.ceil(filteredPosts.length / postsPerPage);
  let html = '';
  for (let i = 1; i <= totalPages; i++) {
    html += `<button class="${i === currentPage ? 'active' : ''}" onclick="currentPage=${i};renderContentList()">${i}</button>`;
  }
  pagination.innerHTML = html;
}
</script>
</body>
</html>
