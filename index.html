<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>品牌社交矩阵分析</title>
<style>
:root {
  --bg:         #f5f7fa;
  --surface:    #ffffff;
  --border:     #e5e9ef;
  --text:       #111827;
  --text-sub:   #6b7280;
  --text-dim:   #9ca3af;
  --blue:       #2563eb;
  --blue-light: #3b82f6;
  --blue-dim:   rgba(37,99,235,.06);
  --blue-mid:   rgba(37,99,235,.15);
  --byd:        #0891b2;
  --byd-dim:    rgba(8,145,178,.08);
  --byd-mid:    rgba(8,145,178,.2);
  --ford:       #2563eb;
  --ford-dim:   rgba(37,99,235,.08);
  --ford-mid:   rgba(37,99,235,.2);
  --toyota:     #dc2626;
  --toyota-dim: rgba(220,38,38,.08);
  --toyota-mid: rgba(220,38,38,.2);
  --radius:     6px;
  --radius-lg:  10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', 'PingFang SC', 'SF Pro Display', system-ui, sans-serif;
  font-size: 13px;
  line-height: 1.5;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Topbar ── */
.topbar {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  height: 50px;
  box-shadow: 0 1px 3px rgba(0,0,0,.05);
  flex-shrink: 0;
}
.topbar-logo {
  display: flex; align-items: center; gap: 8px;
  font-size: 14px; font-weight: 700; letter-spacing: -.3px;
  color: var(--text); text-decoration: none;
}
.topbar-logo .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--blue); }
.topbar-divider { width: 1px; height: 18px; background: var(--border); }
.topbar-sub { font-size: 12px; color: var(--text-sub); }

/* ── Main content ── */
.home-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 24px;
}

.home-header {
  text-align: center;
  margin-bottom: 52px;
}
.home-eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--blue);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.home-eyebrow::before,
.home-eyebrow::after {
  content: '';
  display: block;
  width: 28px;
  height: 1px;
  background: var(--blue-mid);
}
.home-title {
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -.6px;
  margin-bottom: 10px;
  line-height: 1.2;
}
.home-desc {
  font-size: 13px;
  color: var(--text-sub);
  line-height: 1.6;
  max-width: 460px;
  margin: 0 auto;
}

/* ── Brand cards grid ── */
.brand-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  width: 100%;
  max-width: 900px;
}

.brand-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 28px 24px 24px;
  text-decoration: none;
  color: inherit;
  cursor: pointer;
  transition: all .2s;
  display: flex;
  flex-direction: column;
  gap: 16px;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
  position: relative;
  overflow: hidden;
}
.brand-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  transition: opacity .2s;
  opacity: .7;
}
.brand-card.toyota::before { background: var(--toyota); }
.brand-card.byd::before    { background: var(--byd); }
.brand-card.ford::before   { background: var(--ford); }

.brand-card:hover {
  border-color: #d1d5db;
  box-shadow: 0 8px 24px rgba(0,0,0,.10);
  transform: translateY(-2px);
}
.brand-card.toyota:hover { border-color: var(--toyota-mid); }
.brand-card.byd:hover    { border-color: var(--byd-mid); }
.brand-card.ford:hover   { border-color: var(--ford-mid); }

.brand-card:hover::before { opacity: 1; }

.brand-card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.brand-logo-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand-icon {
  width: 36px; height: 36px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; letter-spacing: -.5px;
  flex-shrink: 0;
}
.brand-card.toyota .brand-icon { background: var(--toyota-dim); color: var(--toyota); border: 1px solid var(--toyota-mid); }
.brand-card.byd    .brand-icon { background: var(--byd-dim);    color: var(--byd);    border: 1px solid var(--byd-mid); }
.brand-card.ford   .brand-icon { background: var(--ford-dim);   color: var(--ford);   border: 1px solid var(--ford-mid); }

.brand-name {
  font-size: 15px;
  font-weight: 800;
  letter-spacing: -.3px;
  color: var(--text);
}
.brand-sub {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 1px;
}

.brand-arrow {
  width: 26px; height: 26px;
  border: 1px solid var(--border);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-dim);
  transition: all .2s;
  flex-shrink: 0;
}
.brand-card:hover .brand-arrow {
  color: var(--text);
  border-color: #d1d5db;
}
.brand-card.toyota:hover .brand-arrow { color: var(--toyota); border-color: var(--toyota-mid); background: var(--toyota-dim); }
.brand-card.byd:hover    .brand-arrow { color: var(--byd);    border-color: var(--byd-mid);    background: var(--byd-dim); }
.brand-card.ford:hover   .brand-arrow { color: var(--ford);   border-color: var(--ford-mid);   background: var(--ford-dim); }

.brand-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}
.brand-stat-item {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 10px;
}
.brand-stat-label {
  font-size: 10px;
  color: var(--text-dim);
  font-weight: 600;
  margin-bottom: 3px;
}
.brand-stat-value {
  font-size: 16px;
  font-weight: 800;
  letter-spacing: -.5px;
  line-height: 1;
}
.brand-card.toyota .brand-stat-value { color: var(--toyota); }
.brand-card.byd    .brand-stat-value { color: var(--byd); }
.brand-card.ford   .brand-stat-value { color: var(--ford); }

.brand-platforms {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}
.plat-badge {
  padding: 2px 8px;
  border-radius: 100px;
  font-size: 10.5px;
  font-weight: 600;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text-sub);
}

/* ── Footer note ── */
.home-footer {
  margin-top: 40px;
  text-align: center;
  font-size: 11.5px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: center;
}
.home-footer .dot-sep { width: 3px; height: 3px; border-radius: 50%; background: var(--border); }

/* ── Site Footer ── */
.site-footer {
  border-top: 1px solid var(--border);
  background: #fff;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-size: 11.5px;
  color: var(--text-dim);
}
.site-footer .footer-logo {
  display: flex; align-items: center; gap: 5px;
  text-decoration: none;
}
.site-footer .footer-logo-text {
  font-weight: 800;
  font-size: 12px;
  letter-spacing: -.3px;
  background: linear-gradient(90deg, #6366f1 0%, #ec4899 40%, #f59e0b 80%, #10b981 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.site-footer .footer-sep {
  width: 3px; height: 3px; border-radius: 50%;
  background: var(--border); flex-shrink: 0;
}
.site-footer .footer-date {
  color: var(--text-dim);
}
</style>
</head>
<body>

<header class="topbar">
  <a href="index.html" class="topbar-logo">
    <div class="dot"></div>
    Brand Research
  </a>
  <div class="topbar-divider"></div>
  <span class="topbar-sub">品牌社交矩阵分析平台</span>
</header>

<div class="home-wrap">
  <div class="home-header">
    <div class="home-eyebrow">Brand Social Matrix</div>
    <h1 class="home-title">品牌社交矩阵分析</h1>
    <p class="home-desc">选择一个品牌，查看其跨平台社交媒体账号矩阵与内容发布数据分析。</p>
  </div>

  <div class="brand-grid" id="brand-grid">
    <!-- Cards injected by JS after data loads -->
  </div>

  <div class="home-footer">
    <span>数据来源：TikTok · Instagram · Facebook</span>
    <span class="dot-sep"></span>
    <span id="footer-range">加载中...</span>
  </div>
</div>

<footer class="site-footer">
  <span class="footer-logo">
    <span>Powered by</span>
    <span class="footer-logo-text">WantAi OS</span>
  </span>
  <span class="footer-sep"></span>
  <span class="footer-date">Updated on April 05, 2026</span>
</footer>

<script>
fetch('timeline_data.json')
  .then(r => r.json())
  .then(data => {
    const posts = data.all_posts || [];

    const brands = {
      Toyota: { class: 'toyota', icon: '丰田', fullName: 'Toyota', tagline: '丰田汽车', page: 'toyota.html', color: '#dc2626', accountCount: 3 },
      BYD:    { class: 'byd',    icon: 'BYD',  fullName: 'BYD',    tagline: '比亚迪',   page: 'byd.html',    color: '#0891b2', accountCount: 3 },
      Ford:   { class: 'ford',   icon: 'Ford',  fullName: 'Ford',   tagline: '福特汽车', page: 'ford.html',   color: '#2563eb', accountCount: 3 },
    };

    // Compute per-brand stats
    // Extract @handle from URL, e.g. https://www.tiktok.com/@byd_global/video/...
    const handleFromUrl = url => {
      if (!url) return null;
      const m = url.match(/@([\w.]+)/);
      return m ? m[1] : null;
    };

    const stats = {};
    posts.forEach(p => {
      if (!stats[p.brand]) stats[p.brand] = { total: 0, platforms: new Set(), accounts: new Set() };
      stats[p.brand].total++;
      if (p.platform) stats[p.brand].platforms.add(p.platform);
      const handle = p.account || p.handle || handleFromUrl(p.url);
      if (handle) stats[p.brand].accounts.add(handle);
    });

    const platLabel = { tiktok: 'TikTok', instagram: 'Instagram', facebook: 'Facebook' };

    const grid = document.getElementById('brand-grid');
    grid.innerHTML = Object.entries(brands).map(([key, cfg]) => {
      const s = stats[key] || { total: 0, platforms: new Set(), accounts: new Set() };
      const platCount = s.platforms.size;
      const acctCount = cfg.accountCount;
      const platBadges = [...s.platforms].map(p => `<span class="plat-badge">${platLabel[p]||p}</span>`).join('');

      return `<a href="${cfg.page}" class="brand-card ${cfg.class}">
        <div class="brand-card-top">
          <div class="brand-logo-wrap">
            <div class="brand-icon">${cfg.icon}</div>
            <div>
              <div class="brand-name">${cfg.fullName}</div>
              <div class="brand-sub">${cfg.tagline}</div>
            </div>
          </div>
          <div class="brand-arrow">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M2.5 6h7M6.5 3l3 3-3 3"/>
            </svg>
          </div>
        </div>

        <div class="brand-stats">
          <div class="brand-stat-item">
            <div class="brand-stat-label">内容总量</div>
            <div class="brand-stat-value">${s.total.toLocaleString()}</div>
          </div>
          <div class="brand-stat-item">
            <div class="brand-stat-label">平台数量</div>
            <div class="brand-stat-value">${platCount}</div>
          </div>
          <div class="brand-stat-item">
            <div class="brand-stat-label">账号数量</div>
            <div class="brand-stat-value">${acctCount || '—'}</div>
          </div>
        </div>

        <div class="brand-platforms">${platBadges}</div>
      </a>`;
    }).join('');

    // Footer date range
    const allDates = posts.map(p => p.date).filter(Boolean).sort();
    if (allDates.length) {
      document.getElementById('footer-range').textContent =
        `数据区间：${allDates[0]} — ${allDates[allDates.length-1]}`;
    }
  })
  .catch(() => {
    document.getElementById('brand-grid').innerHTML =
      '<div style="grid-column:1/-1;text-align:center;color:#dc2626;padding:40px">数据加载失败，请刷新重试。</div>';
  });
</script>
</body>
</html>
