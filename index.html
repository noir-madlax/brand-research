<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>品牌社媒内容研究平台</title>
<style>
/* ── Design Tokens ── */
:root {
  --bg:        #080c14;
  --surface:   #0d1220;
  --card:      #111827;
  --card-alt:  #0f1825;
  --border:    rgba(255,255,255,.07);
  --border-hi: rgba(59,130,246,.4);

  --text:      #e2e8f0;
  --text-sub:  #94a3b8;
  --text-dim:  #475569;

  --blue:      #3b82f6;
  --blue-dim:  rgba(59,130,246,.12);
  --blue-mid:  rgba(59,130,246,.25);

  --byd:       #06b6d4;
  --byd-dim:   rgba(6,182,212,.12);
  --ford:      #60a5fa;
  --ford-dim:  rgba(96,165,250,.12);
  --toyota:    #f87171;
  --toyota-dim:rgba(248,113,113,.12);

  --radius:    8px;
  --radius-lg: 12px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', 'PingFang SC', 'SF Pro Display', system-ui, sans-serif;
  font-size: 13px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* ── Header / Topbar ── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(8,12,20,.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  display: flex; align-items: center; gap: 32px; height: 52px;
}
.topbar-logo {
  display: flex; align-items: center; gap: 10px;
  font-size: 14px; font-weight: 700; letter-spacing: -.3px;
  color: var(--text); text-decoration: none; flex-shrink: 0;
}
.topbar-logo .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--blue);
  box-shadow: 0 0 8px var(--blue);
}
.topbar-divider { width: 1px; height: 20px; background: var(--border); }
.topbar-sub {
  font-size: 12px; color: var(--text-sub); flex: 1;
}
.topbar-badges { display: flex; gap: 6px; align-items: center; }
.brand-badge {
  padding: 3px 9px; border-radius: 4px;
  font-size: 11px; font-weight: 700; letter-spacing: .3px;
}
.brand-badge.byd  { background: var(--byd-dim);   color: var(--byd);   border: 1px solid rgba(6,182,212,.2); }
.brand-badge.ford { background: var(--ford-dim);  color: var(--ford);  border: 1px solid rgba(96,165,250,.2); }
.brand-badge.toyota { background: var(--toyota-dim); color: var(--toyota); border: 1px solid rgba(248,113,113,.2); }

/* ── Layout ── */
.app-layout { display: flex; min-height: calc(100vh - 52px); }

/* ── Sidebar ── */
.sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 20px 0;
  position: sticky; top: 52px; height: calc(100vh - 52px); overflow-y: auto;
}
.sidebar-section { margin-bottom: 24px; }
.sidebar-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1px;
  color: var(--text-dim); text-transform: uppercase;
  padding: 0 16px; margin-bottom: 6px;
}
.sidebar-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px;
  font-size: 12.5px; color: var(--text-sub);
  cursor: pointer; transition: all .15s;
  border-left: 2px solid transparent;
  user-select: none;
}
.sidebar-item:hover { color: var(--text); background: rgba(255,255,255,.03); }
.sidebar-item.active {
  color: var(--blue); background: var(--blue-dim);
  border-left-color: var(--blue);
}
.sidebar-item .icon {
  width: 14px; height: 14px; flex-shrink: 0; opacity: .7;
}
.sidebar-sep { height: 1px; background: var(--border); margin: 8px 16px; }

/* ── Main content ── */
.main { flex: 1; min-width: 0; padding: 24px 28px; }

/* ── Filter bar ── */
.filter-bar {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 16px 20px;
  margin-bottom: 20px;
}
.filter-bar-row {
  display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap;
}
.filter-group { display: flex; flex-direction: column; gap: 7px; }
.filter-group-label {
  font-size: 10px; font-weight: 700; letter-spacing: .8px;
  color: var(--text-dim); text-transform: uppercase;
}
.filter-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.chip {
  padding: 4px 11px; border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent; color: var(--text-sub);
  font-size: 11.5px; font-weight: 600; cursor: pointer;
  transition: all .15s; white-space: nowrap;
}
.chip:hover { border-color: rgba(255,255,255,.15); color: var(--text); }
.chip.active { border-color: var(--blue-mid); background: var(--blue-dim); color: var(--blue); }
.chip.active.byd    { border-color: rgba(6,182,212,.3);   background: var(--byd-dim);   color: var(--byd); }
.chip.active.ford   { border-color: rgba(96,165,250,.3);  background: var(--ford-dim);  color: var(--ford); }
.chip.active.toyota { border-color: rgba(248,113,113,.3); background: var(--toyota-dim);color: var(--toyota); }

.date-row { display: flex; gap: 6px; align-items: center; }
.date-input {
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius); background: var(--card-alt);
  color: var(--text); font-size: 12px;
  outline: none; transition: border-color .15s;
}
.date-input:focus { border-color: var(--blue-mid); }
.btn-apply {
  padding: 5px 14px;
  border: 1px solid var(--blue-mid); border-radius: var(--radius);
  background: var(--blue-dim); color: var(--blue);
  font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s;
}
.btn-apply:hover { background: rgba(59,130,246,.2); }
.btn-reset {
  padding: 5px 10px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: transparent; color: var(--text-sub);
  font-size: 12px; cursor: pointer; transition: all .15s;
}
.btn-reset:hover { color: var(--text); border-color: rgba(255,255,255,.15); }

/* ── Active filter tags ── */
.filter-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.filter-tag {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 100px;
  background: var(--blue-dim); border: 1px solid var(--blue-mid);
  color: var(--blue); font-size: 11px;
}
.filter-tag button {
  background: none; border: none; color: inherit;
  cursor: pointer; font-size: 13px; line-height: 1; padding: 0;
  opacity: .7; transition: opacity .15s;
}
.filter-tag button:hover { opacity: 1; }

/* ── Stat cards row ── */
.stats-row {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  cursor: pointer; transition: all .15s;
  display: flex; flex-direction: column; gap: 6px;
}
.stat-card:hover { border-color: rgba(255,255,255,.12); }
.stat-card.active { border-color: var(--blue-mid); background: var(--blue-dim); }
.stat-card-label {
  font-size: 10.5px; font-weight: 600; color: var(--text-dim); letter-spacing: .3px;
}
.stat-card-value {
  font-size: 26px; font-weight: 800; color: var(--blue);
  letter-spacing: -1px; line-height: 1;
}
.stat-card.active.platform-tiktok .stat-card-value { color: #e2e8f0; }
.stat-card.active.platform-ig     .stat-card-value { color: #e879c2; }
.stat-card.active.platform-fb     .stat-card-value { color: var(--ford); }

/* ── Section panel ── */
.panel {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 16px; overflow: hidden;
}
.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
}
.panel-title {
  font-size: 12px; font-weight: 700; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.panel-title .accent-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--blue); flex-shrink: 0;
}
.panel-body { padding: 16px 18px; }

/* ── Timeline heatmap table ── */
.timeline-table-wrap { overflow-x: auto; }
.timeline-table {
  width: 100%; border-collapse: collapse; font-size: 11.5px;
  table-layout: fixed;
}
.timeline-table th {
  padding: 7px 4px; text-align: center;
  color: var(--text-dim); font-weight: 600; font-size: 11px;
  background: var(--card-alt);
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
}
.timeline-table th:first-child { width: 52px; border-left: none; }
.timeline-table td {
  padding: 7px 4px; text-align: center;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  color: var(--text-dim);
  transition: all .15s;
}
.timeline-table td.has-data {
  cursor: pointer; font-weight: 700; color: var(--text);
}
.timeline-table td.has-data:hover { background: var(--blue-dim) !important; color: var(--blue); }
/* heat scale */
.heat-1  { background: rgba(59,130,246,.07);  color: #7ba7ef; }
.heat-2  { background: rgba(59,130,246,.13); }
.heat-3  { background: rgba(59,130,246,.22); }
.heat-4  { background: rgba(59,130,246,.32); color: #a8c7ff; }
.heat-5  { background: rgba(59,130,246,.44); color: #c4daff; }

/* ── Content list ── */
.content-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.content-toolbar-left {
  font-size: 12.5px; font-weight: 700; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.count-badge {
  padding: 2px 8px; border-radius: 4px;
  background: var(--blue-dim); color: var(--blue);
  font-size: 11px; font-weight: 700;
}
.sort-row { display: flex; gap: 5px; }
.sort-btn {
  padding: 4px 11px; border-radius: var(--radius);
  border: 1px solid var(--border); background: transparent;
  color: var(--text-sub); font-size: 11.5px; cursor: pointer; transition: all .15s;
}
.sort-btn:hover { color: var(--text); border-color: rgba(255,255,255,.15); }
.sort-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

/* ── Post card ── */
.post-list { display: flex; flex-direction: column; gap: 6px; }
.post-card {
  background: var(--card-alt); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 13px 16px;
  cursor: pointer; transition: all .15s;
  display: grid; grid-template-columns: auto 1fr auto; gap: 14px; align-items: start;
}
.post-card:hover { border-color: rgba(255,255,255,.12); background: var(--card); }
.post-card:hover .post-title { color: var(--blue); }

.post-card-left { display: flex; flex-direction: column; align-items: center; gap: 6px; padding-top: 2px; }
.platform-icon {
  width: 28px; height: 28px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; flex-shrink: 0;
}
.platform-icon.tt { background: rgba(255,255,255,.06); color: var(--text); }
.platform-icon.ig { background: rgba(193,53,132,.12); color: #e879c2; }
.platform-icon.fb { background: var(--ford-dim); color: var(--ford); }

.post-card-body { min-width: 0; }
.post-meta {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 5px; flex-wrap: wrap;
}
.post-date { font-size: 11px; color: var(--text-dim); }
.post-brand {
  font-size: 11px; font-weight: 700;
}
.post-brand.byd    { color: var(--byd); }
.post-brand.ford   { color: var(--ford); }
.post-brand.toyota { color: var(--toyota); }

.ct-tag {
  padding: 2px 7px; border-radius: 3px;
  font-size: 10.5px; font-weight: 700; letter-spacing: .2px;
}
.model-tag {
  padding: 2px 7px; border-radius: 3px;
  font-size: 10.5px; font-weight: 600;
  background: var(--blue-dim); color: var(--blue);
  border: 1px solid rgba(59,130,246,.2);
}
.post-title {
  font-size: 12.5px; color: var(--text); line-height: 1.55;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; transition: color .15s;
}

.post-card-right {
  display: flex; flex-direction: column; gap: 5px; align-items: flex-end;
  flex-shrink: 0; padding-top: 2px;
}
.post-stat {
  display: flex; align-items: center; gap: 4px;
  font-size: 11.5px; color: var(--text-sub);
}
.post-stat .val { font-weight: 700; color: var(--text); }
.post-stat .ico { color: var(--text-dim); font-size: 11px; }

/* ── Pagination ── */
.pagination {
  display: flex; gap: 5px; justify-content: center; margin-top: 16px;
  flex-wrap: wrap;
}
.page-btn {
  min-width: 32px; height: 32px; padding: 0 8px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--card); color: var(--text-sub);
  font-size: 12px; cursor: pointer; transition: all .15s;
}
.page-btn:hover { color: var(--text); border-color: rgba(255,255,255,.15); }
.page-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
.page-btn:disabled { opacity: .3; cursor: not-allowed; }

/* ── Launch report ── */
.stage-row {
  display: grid; grid-template-columns: 28px 1fr; gap: 12px;
  padding: 16px 0; border-bottom: 1px solid var(--border);
  align-items: start;
}
.stage-row:last-child { border-bottom: none; }
.stage-num {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--blue-dim); border: 1px solid var(--blue-mid);
  color: var(--blue); font-size: 12px; font-weight: 800;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.stage-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
.stage-meta { font-size: 11.5px; color: var(--text-sub); margin-bottom: 8px; }
.stage-posts { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }

/* ── Tab nav ── */
.tab-nav {
  display: flex; gap: 0; margin-bottom: 18px;
  border-bottom: 1px solid var(--border);
}
.tab-btn {
  padding: 10px 18px;
  background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--text-sub); font-size: 12.5px; font-weight: 600;
  cursor: pointer; transition: all .15s; white-space: nowrap;
  margin-bottom: -1px;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── Loading overlay ── */
.loading-overlay {
  position: fixed; inset: 0;
  background: rgba(8,12,20,.96);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
}
.loading-box { text-align: center; }
.loading-spinner {
  width: 36px; height: 36px; border-radius: 50%;
  border: 2px solid var(--border);
  border-top-color: var(--blue);
  animation: spin .8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--text-sub); }

/* ── Utilities ── */
.flex { display: flex; }
.items-center { align-items: center; }
.gap-8 { gap: 8px; }
.hidden { display: none !important; }

/* Content-type color map */
.ct-Product          { background: rgba(59,130,246,.12);  color: #60a5fa; }
.ct-Campaign         { background: rgba(236,72,153,.1);   color: #f472b6; }
.ct-TechSafety       { background: rgba(16,185,129,.1);   color: #34d399; }
.ct-Brand            { background: rgba(139,92,246,.1);   color: #a78bfa; }
.ct-OwnerUGC         { background: rgba(245,158,11,.1);   color: #fbbf24; }
.ct-Lifestyle        { background: rgba(8,145,178,.1);    color: #22d3ee; }
.ct-Guide            { background: rgba(249,115,22,.1);   color: #fb923c; }
.ct-Milestone        { background: rgba(168,85,247,.1);   color: #c084fc; }
.ct-Service          { background: rgba(52,211,153,.1);   color: #6ee7b7; }
.ct-Creative         { background: rgba(244,63,94,.1);    color: #fb7185; }
.ct-Other            { background: rgba(107,114,128,.1);  color: #9ca3af; }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-box">
    <div class="loading-spinner"></div>
    <div class="loading-text">正在加载社媒内容数据</div>
  </div>
</div>

<!-- Topbar -->
<header class="topbar">
  <div class="topbar-logo">
    <div class="dot"></div>
    Brand Research
  </div>
  <div class="topbar-divider"></div>
  <div class="topbar-sub">BYD · Ford · Toyota 社交媒体内容聚合分析</div>
  <div class="topbar-badges">
    <span class="brand-badge byd">BYD</span>
    <span class="brand-badge ford">Ford</span>
    <span class="brand-badge toyota">Toyota</span>
  </div>
</header>

<!-- App layout -->
<div class="app-layout">

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">分析视图</div>
      <div class="sidebar-item active" onclick="switchTab('timeline')">
        <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="1" y="3" width="14" height="10" rx="1.5"/>
          <line x1="5" y1="3" x2="5" y2="13"/>
          <line x1="11" y1="3" x2="11" y2="13"/>
          <line x1="1" y1="7" x2="15" y2="7"/>
          <line x1="1" y1="10" x2="15" y2="10"/>
        </svg>
        时间轴与热力图
      </div>
      <div class="sidebar-item" onclick="switchTab('launch')">
        <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M8 1.5l1.5 3 3.5.5-2.5 2.5.5 3.5L8 9.5l-3 1.5.5-3.5L3 5l3.5-.5L8 1.5z"/>
        </svg>
        车型上市分析
      </div>
    </div>
    <div class="sidebar-sep"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">数据维度</div>
      <div class="sidebar-item" id="sidebar-total" style="justify-content:space-between">
        <span style="display:flex;align-items:center;gap:8px">
          <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M2 11l4-6 3 4 2-3 3 5"/>
          </svg>
          全部内容
        </span>
        <span id="sidebar-total-num" style="font-size:11px;font-weight:700;color:var(--blue)">—</span>
      </div>
      <div class="sidebar-item" id="sidebar-tiktok" style="justify-content:space-between">
        <span style="display:flex;align-items:center;gap:8px">
          <svg class="icon" viewBox="0 0 16 16" fill="currentColor">
            <path d="M9 2h2c.5 2 1.8 2.8 3 3v2c-1.2 0-2.3-.4-3-1v5a4 4 0 11-4-4V9a2 2 0 102 2V2z"/>
          </svg>
          TikTok
        </span>
        <span id="sidebar-tiktok-num" style="font-size:11px;font-weight:700;color:var(--text-dim)">—</span>
      </div>
      <div class="sidebar-item" id="sidebar-ig" style="justify-content:space-between">
        <span style="display:flex;align-items:center;gap:8px">
          <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="2" width="12" height="12" rx="3"/>
            <circle cx="8" cy="8" r="2.5"/>
            <circle cx="11.5" cy="4.5" r=".5" fill="currentColor"/>
          </svg>
          Instagram
        </span>
        <span id="sidebar-ig-num" style="font-size:11px;font-weight:700;color:var(--text-dim)">—</span>
      </div>
      <div class="sidebar-item" id="sidebar-fb" style="justify-content:space-between">
        <span style="display:flex;align-items:center;gap:8px">
          <svg class="icon" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 1a7 7 0 100 14A7 7 0 008 1zm1 8H8v4H6V9H5V7h1V6a2 2 0 012-2h2v2H9a.5.5 0 00-.5.5V7H11l-.5 2H8.5z"/>
          </svg>
          Facebook
        </span>
        <span id="sidebar-fb-num" style="font-size:11px;font-weight:700;color:var(--text-dim)">—</span>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="main">

    <!-- Tab nav -->
    <div class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('timeline')">时间轴与热力图</button>
      <button class="tab-btn" onclick="switchTab('launch')">车型上市分析</button>
    </div>

    <!-- ══ TAB 1: Timeline ══ -->
    <div id="tab-timeline" class="tab-content active">

      <!-- Filter bar -->
      <div class="filter-bar">
        <div class="filter-bar-row">
          <div class="filter-group">
            <div class="filter-group-label">品牌</div>
            <div class="filter-chips">
              <button class="chip active" data-filter="brand" data-value="all">全部</button>
              <button class="chip active byd" data-filter="brand" data-value="BYD">BYD</button>
              <button class="chip active ford" data-filter="brand" data-value="Ford">Ford</button>
              <button class="chip active toyota" data-filter="brand" data-value="Toyota">Toyota</button>
            </div>
          </div>
          <div class="filter-group">
            <div class="filter-group-label">车型</div>
            <div class="filter-chips" id="model-filter-buttons">
              <button class="chip active" data-filter="model" data-value="all">全部</button>
            </div>
          </div>
          <div class="filter-group">
            <div class="filter-group-label">日期范围</div>
            <div class="date-row">
              <input type="date" class="date-input" id="date-from">
              <span style="color:var(--text-dim);font-size:11px">—</span>
              <input type="date" class="date-input" id="date-to">
              <button class="btn-apply" onclick="applyFilters()">应用</button>
              <button class="btn-reset" onclick="resetDateFilter()">重置</button>
            </div>
          </div>
          <div class="filter-group">
            <div class="filter-group-label">平台</div>
            <div class="filter-chips">
              <button class="chip active" data-filter="platform" data-value="all">全部</button>
              <button class="chip active" data-filter="platform" data-value="tiktok">TikTok</button>
              <button class="chip active" data-filter="platform" data-value="instagram">Instagram</button>
              <button class="chip active" data-filter="platform" data-value="facebook">Facebook</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Active filter tags -->
      <div id="active-filter-tags" class="filter-tags hidden"></div>

      <!-- Stats row -->
      <div class="stats-row" id="stats-row"></div>

      <!-- Timeline heatmap -->
      <div class="panel" id="timeline-panel">
        <div class="panel-header">
          <div class="panel-title">
            <div class="accent-dot"></div>
            发布热力图（年 × 月）
          </div>
          <div style="font-size:11px;color:var(--text-dim)" id="timeline-range-label"></div>
        </div>
        <div class="panel-body">
          <div class="timeline-table-wrap">
            <table class="timeline-table" id="timeline-table"></table>
          </div>
        </div>
      </div>

      <!-- Launch report for single model -->
      <div class="panel hidden" id="launch-report-panel">
        <div class="panel-header">
          <div class="panel-title">
            <div class="accent-dot"></div>
            车型销售进程
          </div>
        </div>
        <div class="panel-body" id="launch-report-body"></div>
      </div>

      <!-- Content list -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">
            <div class="accent-dot"></div>
            内容列表
            <span class="count-badge" id="content-count-badge">0</span>
          </div>
          <div class="sort-row">
            <button class="sort-btn active" data-sort="date" data-order="desc">最新</button>
            <button class="sort-btn" data-sort="like" data-order="desc">点赞</button>
            <button class="sort-btn" data-sort="comment" data-order="desc">评论</button>
            <button class="sort-btn" data-sort="share" data-order="desc">转发</button>
          </div>
        </div>
        <div class="panel-body" style="padding-bottom:8px">
          <div class="post-list" id="post-list"></div>
          <div class="pagination" id="pagination"></div>
        </div>
      </div>

    </div>
    <!-- ══ End TAB 1 ══ -->

    <!-- ══ TAB 2: Launch ══ -->
    <div id="tab-launch" class="tab-content">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">
            <div class="accent-dot"></div>
            新车上市分析
          </div>
        </div>
        <div class="panel-body">
          <p style="color:var(--text-sub);font-size:13px">请在「时间轴与热力图」视图中选择单一品牌和单一车型，系统将在此处展示完整的上市进程分析。</p>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
/* ══════════════════════════════════════════
   State
══════════════════════════════════════════ */
let allData = null;
let filteredPosts = [];
let currentPage = 1;
const PER_PAGE = 20;

const filters = {
  brands:    new Set(['all']),
  models:    new Set(['all']),
  platforms: new Set(['tiktok', 'instagram', 'facebook']),
  dateFrom:  null,
  dateTo:    null,
  sortBy:    'date',
  sortOrder: 'desc',
};

/* ══════════════════════════════════════════
   Boot
══════════════════════════════════════════ */
fetch('timeline_data.json')
  .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
  .then(data => {
    allData = data;
    initUI();
    applyFilters();
    document.getElementById('loading-overlay').style.display = 'none';
  })
  .catch(err => {
    document.getElementById('loading-overlay').innerHTML = `
      <div style="text-align:center">
        <div style="font-size:28px;margin-bottom:12px;color:var(--toyota)">!</div>
        <div style="font-size:14px;font-weight:700;margin-bottom:8px">加载失败</div>
        <div style="color:var(--text-sub);font-size:12px;margin-bottom:16px">${err.message}</div>
        <button onclick="location.reload()" style="padding:8px 20px;background:var(--blue);border:none;border-radius:6px;color:#fff;font-size:13px;cursor:pointer">重试</button>
      </div>`;
  });

/* ══════════════════════════════════════════
   Tab
══════════════════════════════════════════ */
function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(el => {
    if ((tab === 'timeline' && el.textContent.includes('热力图')) ||
        (tab === 'launch'   && el.textContent.includes('上市'))) {
      el.classList.add('active');
    }
  });
  document.querySelectorAll('.sidebar-item').forEach(el => {
    el.classList.toggle('active',
      (tab === 'timeline' && el.textContent.includes('热力图')) ||
      (tab === 'launch'   && el.textContent.includes('上市'))
    );
  });
}

/* ══════════════════════════════════════════
   initUI
══════════════════════════════════════════ */
function initUI() {
  updateModelOptions();

  // Brand chips
  document.querySelectorAll('[data-filter="brand"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const val = btn.dataset.value;
      if (val === 'all') {
        filters.brands.clear();
        filters.brands.add('all');
      } else {
        filters.brands.delete('all');
        filters.brands.has(val) ? filters.brands.delete(val) : filters.brands.add(val);
        if (filters.brands.size === 0) filters.brands.add('all');
      }
      updateBrandChips();
      filters.models.clear(); filters.models.add('all');
      updateModelOptions();
      applyFilters();
    });
  });

  // Platform chips
  document.querySelectorAll('[data-filter="platform"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const val = btn.dataset.value;
      if (val === 'all') {
        if (filters.platforms.size === 3) {
          filters.platforms.clear();
        } else {
          filters.platforms = new Set(['tiktok','instagram','facebook']);
        }
      } else {
        filters.platforms.has(val) ? filters.platforms.delete(val) : filters.platforms.add(val);
      }
      updatePlatformChips();
      applyFilters();
    });
  });

  // Model chips (delegated)
  document.getElementById('model-filter-buttons').addEventListener('click', e => {
    const btn = e.target.closest('[data-filter="model"]');
    if (!btn) return;
    const val = btn.dataset.value;
    if (val === 'all') {
      filters.models.clear(); filters.models.add('all');
    } else {
      filters.models.delete('all');
      filters.models.has(val) ? filters.models.delete(val) : filters.models.add(val);
      if (filters.models.size === 0) filters.models.add('all');
      autoSelectBrandForModel(val);
    }
    updateModelChips();
    applyFilters();
  });

  // Sort buttons
  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filters.sortBy    = btn.dataset.sort;
      filters.sortOrder = btn.dataset.order;
      currentPage = 1;
      applyFilters();
    });
  });
}

/* ══════════════════════════════════════════
   Chip update helpers
══════════════════════════════════════════ */
function updateBrandChips() {
  document.querySelectorAll('[data-filter="brand"]').forEach(btn => {
    const v = btn.dataset.value;
    const on = v === 'all' ? filters.brands.has('all') : filters.brands.has(v);
    btn.classList.toggle('active', on);
  });
}

function updatePlatformChips() {
  document.querySelectorAll('[data-filter="platform"]').forEach(btn => {
    const v = btn.dataset.value;
    const on = v === 'all' ? filters.platforms.size === 3 : filters.platforms.has(v);
    btn.classList.toggle('active', on);
  });
}

function updateModelChips() {
  document.querySelectorAll('[data-filter="model"]').forEach(btn => {
    const v = btn.dataset.value;
    btn.classList.toggle('active', v === 'all' ? filters.models.has('all') : filters.models.has(v));
  });
}

function updateModelOptions() {
  const brands = filters.brands.has('all') ? ['BYD','Ford','Toyota'] : Array.from(filters.brands);
  const available = new Set();
  if (allData && allData.all_posts) {
    allData.all_posts.forEach(p => {
      if (brands.includes(p.brand) && p.models) p.models.forEach(m => available.add(m));
    });
  }
  const wrap = document.getElementById('model-filter-buttons');
  wrap.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'chip active'; allBtn.dataset.filter = 'model'; allBtn.dataset.value = 'all';
  allBtn.textContent = '全部'; wrap.appendChild(allBtn);
  Array.from(available).sort().forEach(m => {
    const b = document.createElement('button');
    b.className = 'chip'; b.dataset.filter = 'model'; b.dataset.value = m;
    b.textContent = m; wrap.appendChild(b);
  });
  updateModelChips();
}

/* ══════════════════════════════════════════
   Brand → Model auto-select
══════════════════════════════════════════ */
const BRAND_OF = {
  Shark:'BYD', Song:'BYD', Qin:'BYD', Yuan:'BYD', Seagull:'BYD',
  Atto:'BYD', Sealion:'BYD', Denza:'BYD',
  Ranger:'Ford', Mustang:'Ford', 'F-150':'Ford', Escape:'Ford',
  Explorer:'Ford', Bronco:'Ford', 'Mach-E':'Ford', GT:'Ford',
  Hilux:'Toyota', Corolla:'Toyota', Camry:'Toyota', '4Runner':'Toyota',
  'Land Cruiser':'Toyota', RAV4:'Toyota', Prius:'Toyota',
  Sequoia:'Toyota', Highlander:'Toyota', Sienna:'Toyota',
};
function autoSelectBrandForModel(model) {
  const brand = BRAND_OF[model];
  if (brand && !filters.brands.has(brand)) {
    filters.brands.delete('all'); filters.brands.add(brand);
    updateBrandChips();
  }
}

/* ══════════════════════════════════════════
   Filter tags
══════════════════════════════════════════ */
function renderFilterTags() {
  const tags = [];
  if (!filters.brands.has('all'))    Array.from(filters.brands).forEach(v => tags.push({type:'brand',value:v,label:v}));
  if (!filters.models.has('all'))    Array.from(filters.models).forEach(v => tags.push({type:'model',value:v,label:v}));
  if (filters.platforms.size !== 3) Array.from(filters.platforms).forEach(v => tags.push({type:'platform',value:v,label:{tiktok:'TikTok',instagram:'Instagram',facebook:'Facebook'}[v]}));
  if (filters.dateFrom || filters.dateTo) tags.push({type:'date',value:'date',label:`${filters.dateFrom||'—'} ~ ${filters.dateTo||'—'}`});

  const wrap = document.getElementById('active-filter-tags');
  if (!tags.length) { wrap.classList.add('hidden'); return; }
  wrap.classList.remove('hidden');
  wrap.innerHTML = tags.map(t => `
    <div class="filter-tag">
      ${t.label}
      <button onclick="removeTag('${t.type}','${t.value}')">×</button>
    </div>`).join('');
}

function removeTag(type, value) {
  if (type === 'brand')    { filters.brands.delete(value); if (!filters.brands.size) filters.brands.add('all'); updateBrandChips(); updateModelOptions(); }
  if (type === 'model')    { filters.models.delete(value); if (!filters.models.size) filters.models.add('all'); updateModelChips(); }
  if (type === 'platform') { filters.platforms.delete(value); updatePlatformChips(); }
  if (type === 'date')     { resetDateFilter(); return; }
  applyFilters();
}

function resetDateFilter() {
  document.getElementById('date-from').value = '';
  document.getElementById('date-to').value   = '';
  filters.dateFrom = null; filters.dateTo = null;
  applyFilters();
}

/* ══════════════════════════════════════════
   applyFilters
══════════════════════════════════════════ */
function applyFilters() {
  if (!allData) return;
  filters.dateFrom = document.getElementById('date-from').value || null;
  filters.dateTo   = document.getElementById('date-to').value   || null;

  filteredPosts = allData.all_posts.filter(p => {
    if (!filters.brands.has('all') && !filters.brands.has(p.brand)) return false;
    if (!filters.models.has('all')) {
      if (!p.models || !Array.from(filters.models).some(m => p.models.includes(m))) return false;
    }
    if (!filters.platforms.has(p.platform)) return false;
    if (filters.dateFrom && p.date < filters.dateFrom) return false;
    if (filters.dateTo   && p.date > filters.dateTo)   return false;
    return true;
  });

  filteredPosts.sort((a,b) => {
    let av=0,bv=0;
    if (filters.sortBy==='date')    { av=new Date(a.date).getTime(); bv=new Date(b.date).getTime(); }
    else if (filters.sortBy==='like')    { av=a.like||0;    bv=b.like||0; }
    else if (filters.sortBy==='comment') { av=a.comment||0; bv=b.comment||0; }
    else if (filters.sortBy==='share')   { av=a.share||0;   bv=b.share||0; }
    return filters.sortOrder==='desc' ? bv-av : av-bv;
  });

  currentPage = 1;
  renderStats();
  renderTimeline();
  renderPostList();
  renderFilterTags();
  renderLaunchReport();
  updateSidebarCounts();
}

/* ══════════════════════════════════════════
   Stats
══════════════════════════════════════════ */
function renderStats() {
  const wrap = document.getElementById('stats-row');
  const platCounts = {
    all: filteredPosts.length,
    tiktok: filteredPosts.filter(p => p.platform==='tiktok').length,
    instagram: filteredPosts.filter(p => p.platform==='instagram').length,
    facebook: filteredPosts.filter(p => p.platform==='facebook').length,
  };
  const labels = {all:'全部内容',tiktok:'TikTok',instagram:'Instagram',facebook:'Facebook'};
  const platKeys = ['all','tiktok','instagram','facebook'];
  wrap.innerHTML = platKeys.map(k => {
    const isActive = k==='all' ? filters.platforms.size===3 : filters.platforms.has(k);
    return `<div class="stat-card ${isActive?'active':''} platform-${k}" onclick="togglePlatform('${k}')">
      <div class="stat-card-label">${labels[k]}</div>
      <div class="stat-card-value">${platCounts[k].toLocaleString()}</div>
    </div>`;
  }).join('');
}

function togglePlatform(plat) {
  if (plat === 'all') {
    filters.platforms = filters.platforms.size===3 ? new Set() : new Set(['tiktok','instagram','facebook']);
  } else {
    filters.platforms.has(plat) ? filters.platforms.delete(plat) : filters.platforms.add(plat);
  }
  updatePlatformChips();
  applyFilters();
}

function updateSidebarCounts() {
  const total = allData ? allData.all_posts.length : 0;
  document.getElementById('sidebar-total-num').textContent  = filteredPosts.length.toLocaleString();
  document.getElementById('sidebar-tiktok-num').textContent = filteredPosts.filter(p=>p.platform==='tiktok').length.toLocaleString();
  document.getElementById('sidebar-ig-num').textContent     = filteredPosts.filter(p=>p.platform==='instagram').length.toLocaleString();
  document.getElementById('sidebar-fb-num').textContent     = filteredPosts.filter(p=>p.platform==='facebook').length.toLocaleString();
}

/* ══════════════════════════════════════════
   Timeline heatmap
══════════════════════════════════════════ */
function renderTimeline() {
  const panel = document.getElementById('timeline-panel');
  const table = document.getElementById('timeline-table');
  if (!filteredPosts.length) { panel.classList.add('hidden'); return; }

  const monthData = {};
  filteredPosts.forEach(p => {
    const ym = p.date.slice(0,7);
    monthData[ym] = (monthData[ym]||0) + 1;
  });

  const yms = Object.keys(monthData).sort();
  if (!yms.length) { panel.classList.add('hidden'); return; }
  panel.classList.remove('hidden');

  const maxVal = Math.max(...Object.values(monthData));
  const [minY] = yms[0].split('-').map(Number);
  const [maxY] = yms[yms.length-1].split('-').map(Number);

  document.getElementById('timeline-range-label').textContent = `${yms[0]} — ${yms[yms.length-1]}`;

  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  let html = `<tr><th>年份</th>${months.map(m=>`<th>${m}</th>`).join('')}</tr>`;
  for (let y=minY; y<=maxY; y++) {
    html += `<tr><th>${y}</th>`;
    for (let m=1; m<=12; m++) {
      const ym = `${y}-${String(m).padStart(2,'0')}`;
      const cnt = monthData[ym]||0;
      if (cnt) {
        const heat = Math.ceil((cnt/maxVal)*5);
        html += `<td class="has-data heat-${heat}" onclick="filterByMonth('${ym}')" title="${cnt} 条内容">${cnt}</td>`;
      } else {
        html += `<td></td>`;
      }
    }
    html += '</tr>';
  }
  table.innerHTML = html;
}

function filterByMonth(ym) {
  const [y,m] = ym.split('-').map(Number);
  const first = ym+'-01';
  const last  = ym+'-'+String(new Date(y,m,0).getDate()).padStart(2,'0');
  document.getElementById('date-from').value = first;
  document.getElementById('date-to').value   = last;
  applyFilters();
}

/* ══════════════════════════════════════════
   Post list
══════════════════════════════════════════ */
const CT_CLASS = {
  'Product':'ct-Product','Campaign':'ct-Campaign','Tech & Safety':'ct-TechSafety',
  'Brand':'ct-Brand','Owner & UGC':'ct-OwnerUGC','Lifestyle & Scenario':'ct-Lifestyle',
  'Guide':'ct-Guide','Milestone':'ct-Milestone','Service':'ct-Service',
  'Creative & Hot Topic':'ct-Creative',
};
const CT_LABEL = {
  'Product':'产品','Campaign':'营销活动','Tech & Safety':'技术安全',
  'Brand':'品牌','Owner & UGC':'UGC','Lifestyle & Scenario':'生活方式',
  'Guide':'导购','Milestone':'里程碑','Service':'服务',
  'Creative & Hot Topic':'创意热点',
};
const PLAT_ICON = {
  tiktok:   `<div class="platform-icon tt">T</div>`,
  instagram:`<div class="platform-icon ig">IG</div>`,
  facebook: `<div class="platform-icon fb">f</div>`,
};

function renderPostList() {
  const list  = document.getElementById('post-list');
  const badge = document.getElementById('content-count-badge');
  badge.textContent = filteredPosts.length.toLocaleString();

  const start  = (currentPage-1)*PER_PAGE;
  const slice  = filteredPosts.slice(start, start+PER_PAGE);

  if (!slice.length) {
    list.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-dim)">暂无内容</div>`;
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  list.innerHTML = slice.map(p => {
    const ctClass = CT_CLASS[p.content_type]||'ct-Other';
    const ctLabel = CT_LABEL[p.content_type]||'其他';
    const brandClass = (p.brand||'').toLowerCase();
    const clickAttr  = p.url ? `onclick="window.open('${p.url.replace(/'/g,"\\'")}','_blank')"` : '';

    // Stats
    let stats = '';
    if (p.platform==='tiktok') {
      if (p.play>=0)    stats += statChip('▶', p.play);
      if (p.like>=0)    stats += statChip('♥', p.like);
      if (p.comment>=0) stats += statChip('💬', p.comment);
      if (p.share>=0)   stats += statChip('↗', p.share);
    } else if (p.platform==='instagram') {
      if (p.like>=0)    stats += statChip('♥', p.like);
      if (p.comment>=0) stats += statChip('💬', p.comment);
      if (p.share>=0)   stats += statChip('↗', p.share);
    } else {
      if (p.like>=0)    stats += statChip('👍', p.like);
      if (p.comment>=0) stats += statChip('💬', p.comment);
      if (p.share>=0)   stats += statChip('↗', p.share);
    }

    const modelTags = p.models && p.models.length
      ? p.models.map(m=>`<span class="model-tag">${m}</span>`).join('')
      : '';

    return `<div class="post-card" ${clickAttr}>
      <div class="post-card-left">
        ${PLAT_ICON[p.platform]||''}
      </div>
      <div class="post-card-body">
        <div class="post-meta">
          <span class="post-date">${p.date}</span>
          <span class="post-brand ${brandClass}">${p.brand}</span>
          <span class="ct-tag ${ctClass}">${ctLabel}</span>
          ${modelTags}
        </div>
        <div class="post-title">${p.text||''}</div>
      </div>
      <div class="post-card-right">${stats}</div>
    </div>`;
  }).join('');

  renderPagination();
}

function statChip(icon, val) {
  return `<div class="post-stat"><span class="ico">${icon}</span><span class="val">${(val||0).toLocaleString()}</span></div>`;
}

function renderPagination() {
  const total = Math.ceil(filteredPosts.length / PER_PAGE);
  let html = '';
  if (total <= 1) { document.getElementById('pagination').innerHTML=''; return; }

  html += `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;

  const range = [];
  for (let i=1; i<=total; i++) {
    if (i===1 || i===total || Math.abs(i-currentPage)<=2) range.push(i);
    else if (range[range.length-1]!=='…') range.push('…');
  }
  range.forEach(p => {
    if (p==='…') html += `<button class="page-btn" disabled>…</button>`;
    else html += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
  });

  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>›</button>`;
  document.getElementById('pagination').innerHTML = html;
}

function goPage(n) {
  const total = Math.ceil(filteredPosts.length / PER_PAGE);
  if (n<1||n>total) return;
  currentPage = n;
  renderPostList();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ══════════════════════════════════════════
   Launch Report
══════════════════════════════════════════ */
const STAGE_ORDER = ['项目战略官宣','概念/设计图首发','工信部申报曝光','实车/路测首曝','核心技术/配置发布','预售开启','正式上市','销量公布','车型常规宣传'];

function renderLaunchReport() {
  const panel = document.getElementById('launch-report-panel');
  const body  = document.getElementById('launch-report-body');

  const selBrands = Array.from(filters.brands).filter(b=>b!=='all');
  const selModels = Array.from(filters.models).filter(m=>m!=='all');

  if (selBrands.length!==1 || selModels.length!==1) { panel.classList.add('hidden'); return; }

  const brand = selBrands[0], model = selModels[0];
  let posts = allData.all_posts.filter(p => p.brand===brand && p.models && p.models.includes(model));

  // Find official launch date
  let launchDate = null;
  allData.all_posts.filter(p=>p.brand===brand).forEach(p => {
    if (p.launch_stage==='正式上市') {
      if (!launchDate||p.date<launchDate) launchDate=p.date;
    }
  });

  const staged = {};
  STAGE_ORDER.forEach(s => staged[s]=[]);
  posts.forEach(p => {
    let s = p.launch_stage;
    if (p.model_sales_stage==='车型设计亮点')   s = launchDate && p.date<launchDate ? '核心技术/配置发布':'车型体验/测评';
    else if (p.model_sales_stage==='车型体验/测评') s = launchDate && p.date<launchDate ? '实车/路测首曝':'车型体验/测评';
    else if (p.model_sales_stage==='车型正式上市') s = '正式上市';
    else if (p.model_sales_stage==='车型销量成绩') s = '销量公布';
    else if (p.model_sales_stage==='UNCLASSIFIED') s = (launchDate&&p.date<launchDate)?'核心技术/配置发布':'车型常规宣传';
    if (s && staged[s]) staged[s].push(p);
  });

  const html = STAGE_ORDER.map((stage,i) => {
    const sp = (staged[stage]||[]).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const cnt = sp.length;
    const dateRange = cnt ? `${sp[sp.length-1].date} — ${sp[0].date}` : '—';
    return `<div class="stage-row">
      <div class="stage-num">${i+1}</div>
      <div>
        <div class="stage-title">${stage}</div>
        <div class="stage-meta">${dateRange} · ${cnt} 条内容</div>
        ${cnt ? `<div class="stage-posts">${sp.slice(0,3).map(renderSmallCard).join('')}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  body.innerHTML = html;
  panel.classList.remove('hidden');
}

function renderSmallCard(p) {
  const cls = {tiktok:'tt',instagram:'ig',facebook:'fb'}[p.platform]||'tt';
  return `<div class="post-card" onclick="${p.url?`window.open('${p.url.replace(/'/g,"\\'")}','_blank')`:''}">
    <div class="post-card-left"><div class="platform-icon ${cls}">${{tiktok:'T',instagram:'IG',facebook:'f'}[p.platform]||'?'}</div></div>
    <div class="post-card-body">
      <div class="post-meta"><span class="post-date">${p.date}</span></div>
      <div class="post-title">${p.text||''}</div>
    </div>
    <div class="post-card-right"></div>
  </div>`;
}
</script>
</body>
</html>
